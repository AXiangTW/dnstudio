<body style="font-family:sans-serif; padding:20px;">

<h2>DN STUDIO 批發下單</h2>

<h3>A01 素T</h3>
黑-M：<input id="a01_m"><br><br>

<h3>A02 襯衫</h3>
黑-M：<input id="a02_m"><br><br>

<h3>B01 牛仔褲</h3>
28：<input id="b01_28"><br><br>

<button onclick="testClick()">送出訂單</button>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = window.supabase.createClient(
  "https://rbyvnmmjoklrwpjmgkvg.supabase.co",
  "sb_publishable_e-cmNZ39pJ5dapTDw_OItg_lVErPmw_"
);

async function submitOrder() {

  const orderData = {
    a01_m: document.getElementById("a01_m").value || 0,
    a02_m: document.getElementById("a02_m").value || 0,
    b01_28: document.getElementById("b01_28").value || 0
  };

  const { data, error } = await supabase
    .from("orders")
    .insert([
      {
        customer: "客人",
        data: orderData,
        status: "未處理"
      }
    ]);

  if (error) {
    alert("❌ 失敗：" + error.message);
    console.log(error);
  } else {
    alert("✅ 訂單已送出！");
    console.log(data);
  }
}
</script>

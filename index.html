<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DN STUDIO 批發系統</title>
<style>
body { font-family: sans-serif; padding:20px; }
.card { border:1px solid #ccc; padding:10px; margin:10px 0; }
button { padding:10px; margin-top:10px; }
</style>
</head>
<body>
<h2>DN STUDIO 批發下單</h2>
<div id="products"></div>
<p id="msg"></p>
<script>
const products = [
  { name: "A01 素T", options: ["黑-S","黑-M","黑-L","白-S","白-M","白-L"] },
  { name: "A02 襯衫", options: ["黑-M","黑-L","藍-M","藍-L"] },
  { name: "B01 牛仔褲", options: ["28","30","32"] },
  { name: "B02 短褲", options: ["黑-M","黑-L","卡其-M","卡其-L"] }
];

const container = document.getElementById("products");

products.forEach((p,i)=>{
  let html = `<div class="card"><b>${p.name}</b><br>`;
  p.options.forEach(opt=>{
    html += `${opt}：<input type="number" id="${p.name}_${opt}" value="0"><br>`;
  });
  html += "</div>";
  container.innerHTML += html;
});

async function submitOrder(){
  let order = [];

  products.forEach(p=>{
    p.options.forEach(opt=>{
      let val = document.getElementById(p.name+"_"+opt).value;
      if(val > 0){
        order.push({
          product: p.name,
          option: opt,
          qty: val
        });
      }
    });
  });

  if(order.length === 0){
    alert("請輸入數量");
    return;
  }

  const res = await fetch("https://rbyvnmmjoklrwpjmgkvg.supabase.co/rest/v1/orders", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "apikey":"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJieXZubW1qb2tscndwam1na3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODMxODksImV4cCI6MjA5MDQ1OTE4OX0.z7BBopr3aW1tJRZDXYTAtGX0pVUwALLTHFCcSeqZLx4",
      "Authorization":"Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJieXZubW1qb2tscndwam1na3ZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4ODMxODksImV4cCI6MjA5MDQ1OTE4OX0.z7BBopr3aW1tJRZDXYTAtGX0pVUwALLTHFCcSeqZLx4"
    },
    body: JSON.stringify({
      order_data: order
    })
  });

  if(res.ok){
    document.getElementById("msg").innerText = "✅ 訂單已送出";
  }else{
    document.getElementById("msg").innerText = "❌ 送出失敗";
  }
}
</script>
</body>
</html>

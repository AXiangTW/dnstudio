<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DN STUDIO 批發下單</title>

<style>
body {
  font-family: Arial;
  padding: 10px;
  background: #f5f5f5;
}

.box {
  background: white;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
}

h2 {
  margin: 10px 0;
}

input {
  width: 60px;
  margin-left: 5px;
}

/* 🔥 固定底部按鈕 */
.submit-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: white;
  padding: 10px;
  border-top: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  background: black;
  color: white;
  border: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<h2>DN STUDIO 批發下單</h2>

<div class="box">
<b>A01 素T</b><br>
黑-S <input type="number" id="a1"><br>
黑-M <input type="number" id="a2"><br>
黑-L <input type="number" id="a3"><br>
白-S <input type="number" id="a4"><br>
白-M <input type="number" id="a5"><br>
白-L <input type="number" id="a6"><br>
</div>

<div class="box">
<b>A02 襯衫</b><br>
黑-M <input type="number" id="b1"><br>
黑-L <input type="number" id="b2"><br>
藍-M <input type="number" id="b3"><br>
藍-L <input type="number" id="b4"><br>
</div>

<div class="box">
<b>B01 牛仔褲</b><br>
28 <input type="number" id="c1"><br>
30 <input type="number" id="c2"><br>
32 <input type="number" id="c3"><br>
</div>

<div class="box">
<b>B02 短褲</b><br>
黑-M <input type="number" id="d1"><br>
黑-L <input type="number" id="d2"><br>
卡其-M <input type="number" id="d3"><br>
卡其-L <input type="number" id="d4"><br>
</div>

<!-- 🔥 固定送出按鈕 -->
<div class="submit-bar">
  <button onclick="submitOrder()">送出訂單</button>
</div>

<script>
function submitOrder() {
  let data = {
    A01_S: document.getElementById("a1").value,
    A01_M: document.getElementById("a2").value,
    A01_L: document.getElementById("a3").value,
  };

  console.log(data);

  alert("訂單已送出（Demo版）");
}
</script>

</body>
</html>

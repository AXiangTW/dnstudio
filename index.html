<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DN STUDIO 批發下單</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family:sans-serif;padding:20px;">

<h2>DN STUDIO 批發下單</h2>

<!-- 商品 -->
<h3>A01 素T</h3>
黑-M：<input id="a01_black_m" type="number" value="0"><br><br>

<h3>A02 襯衫</h3>
黑-M：<input id="a02_black_m" type="number" value="0"><br><br>

<h3>B01 牛仔褲</h3>
28：<input id="b01_28" type="number" value="0"><br><br>

<!-- 按鈕 -->
<button onclick="submitOrder()" style="padding:15px;font-size:18px;">
送出訂單
</button>

<script>
const supabase = window.supabase.createClient(
  "https://rbyvnmmjoklrwpjmgkvg.supabase.co",
  "sb_publishable_e-cmNZ39pJ5dapTDw_OItg_lVErPmw_"
);

async function submitOrder() {

  const orderData = {
    A01_黑_M: document.getElementById("a01_black_m").value,
    A02_黑_M: document.getElementById("a02_black_m").value,
    B01_28: document.getElementById("b01_28").value
  };

  const { error } = await supabase
    .from("orders")
    .insert([
      {
        customer: "客人",
        data: orderData,
        status: "未處理"
      }
    ]);

  if (error) {
    alert("❌ 送出失敗");
    console.log(error);
  } else {
    alert("✅ 訂單已送出");

    // 清空
    document.querySelectorAll("input").forEach(i => i.value = 0);
  }
}
</script>

</body>
</html>
